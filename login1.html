<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0d0b;
    --bg-panel: #141310;
    --surface: #1a1916;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.15);
    --text-primary: #f0ebe0;
    --text-secondary: #8a8478;
    --text-muted: #4a4742;
    --error: #e07a6e;
    --radius: 4px;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    -webkit-font-smoothing: antialiased;
  }

  body {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
    overflow: hidden;
  }

  /* ── Left panel ── */
  .panel-left {
    position: relative;
    background: var(--bg-panel);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px 56px;
    overflow: hidden;
    animation: fadeSlideLeft 0.9s ease both;
  }

  .geo { position: absolute; inset: 0; pointer-events: none; }

  .geo-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(201,169,110,0.12);
  }
  .geo-ring:nth-child(1) { width: 480px; height: 480px; top: -160px; right: -160px; }
  .geo-ring:nth-child(2) { width: 320px; height: 320px; top: -80px; right: -80px; }
  .geo-ring:nth-child(3) { width: 600px; height: 600px; bottom: -260px; left: -200px; border-color: rgba(201,169,110,0.06); }
  .geo-line {
    position: absolute;
    background: linear-gradient(to bottom, transparent, rgba(201,169,110,0.15), transparent);
    width: 1px; height: 80%; top: 10%; left: 50%;
  }

  .brand { position: relative; z-index: 1; }
  .brand-mark { display: flex; align-items: center; gap: 10px; }
  .brand-icon {
    width: 34px; height: 34px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
  }
  .brand-icon svg { display: block; }
  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600;
    letter-spacing: 0.06em; color: var(--text-primary);
  }

  .panel-quote { position: relative; z-index: 1; }
  .quote-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 3.5vw, 44px);
    font-weight: 300; font-style: italic;
    line-height: 1.3; color: var(--text-primary);
    margin-bottom: 24px; max-width: 400px;
  }
  .quote-mark {
    font-family: 'Cormorant Garamond', serif;
    font-size: 80px; line-height: 0.6;
    color: var(--accent); opacity: 0.5;
    display: block; margin-bottom: 12px;
  }
  .quote-divider { width: 40px; height: 1px; background: var(--accent); margin-bottom: 16px; opacity: 0.6; }
  .quote-attribution {
    font-size: 13px; font-weight: 300;
    color: var(--text-secondary);
    letter-spacing: 0.12em; text-transform: uppercase;
  }

  /* ── Right panel ── */
  .panel-right {
    display: flex; align-items: center; justify-content: center;
    padding: 48px 64px;
    background: var(--bg);
    animation: fadeSlideRight 0.9s ease both;
  }

  .form-wrapper { width: 100%; max-width: 380px; }

  .form-header { margin-bottom: 44px; }
  .form-eyebrow {
    font-size: 11px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .form-eyebrow::after {
    content: ''; flex: 1; height: 1px;
    background: var(--accent); opacity: 0.3;
  }
  .form-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 40px; font-weight: 400;
    line-height: 1.1; color: var(--text-primary);
  }
  .form-subtitle {
    font-size: 14px; color: var(--text-secondary);
    margin-top: 10px; font-weight: 300; line-height: 1.6;
  }

  .field { margin-bottom: 24px; position: relative; }
  .field-label {
    display: block; font-size: 11px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-secondary); margin-bottom: 10px;
    transition: color 0.2s;
  }
  .field:focus-within .field-label { color: var(--accent); }

  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); transition: color 0.2s;
    display: flex; align-items: center;
  }
  .field:focus-within .input-icon { color: var(--accent); }

  input[type="email"],
  input[type="password"] {
    width: 100%;
    padding: 14px 40px 14px 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 300;
    border-radius: var(--radius);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
    letter-spacing: 0.02em;
  }
  input::placeholder { color: var(--text-muted); }
  input:focus { border-color: var(--accent); background: #1e1d1a; }

  .toggle-pw {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); padding: 4px;
    display: flex; align-items: center; transition: color 0.2s;
  }
  .toggle-pw:hover { color: var(--text-secondary); }

  .form-meta {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 32px; margin-top: -8px;
  }
  .remember { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .remember input[type="checkbox"] {
    appearance: none; width: 16px; height: 16px;
    border: 1px solid var(--border-hover);
    background: var(--surface); border-radius: 2px;
    padding: 0; cursor: pointer;
    display: grid; place-items: center;
    transition: background 0.2s, border-color 0.2s;
  }
  .remember input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .remember input[type="checkbox"]:checked::after {
    content: ''; width: 8px; height: 5px;
    border-left: 1.5px solid #0e0d0b;
    border-bottom: 1.5px solid #0e0d0b;
    transform: rotate(-45deg) translateY(-1px);
  }
  .remember span { font-size: 13px; color: var(--text-secondary); font-weight: 300; }
  .forgot-link {
    font-size: 13px; color: var(--text-secondary);
    text-decoration: none; font-weight: 300; transition: color 0.2s;
  }
  .forgot-link:hover { color: var(--accent); }

  .btn-signin {
    width: 100%; padding: 15px 24px;
    background: var(--accent); border: none;
    border-radius: var(--radius);
    color: #0e0d0b;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; position: relative; overflow: hidden;
    transition: opacity 0.2s, transform 0.15s;
  }
  .btn-signin::before {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.15);
    transform: translateX(-100%); transition: transform 0.4s ease;
  }
  .btn-signin:hover::before { transform: translateX(0); }
  .btn-signin:hover { opacity: 0.92; }
  .btn-signin:active { transform: scale(0.985); }

  .divider { display: flex; align-items: center; gap: 16px; margin: 28px 0; }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 12px; color: var(--text-muted); letter-spacing: 0.1em; }

  .btn-sso {
    width: 100%; padding: 13px 24px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 400; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }
  .btn-sso:hover { border-color: var(--border-hover); color: var(--text-primary); background: var(--surface); }

  .form-footer {
    margin-top: 32px; text-align: center;
    font-size: 13px; color: var(--text-secondary); font-weight: 300;
  }
  .signup-link { color: var(--accent); text-decoration: none; font-weight: 400; transition: opacity 0.2s; }
  .signup-link:hover { opacity: 0.75; }

  .error-msg { font-size: 12px; color: var(--error); margin-top: 6px; display: none; padding-left: 2px; }

  @keyframes fadeSlideLeft {
    from { opacity: 0; transform: translateX(-24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeSlideRight {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @media (max-width: 768px) {
    body { grid-template-columns: 1fr; overflow: auto; }
    .panel-left { display: none; }
    .panel-right { min-height: 100vh; padding: 48px 32px; }
  }
</style>
</head>
<body>

<div class="panel-left">
  <div class="geo" aria-hidden="true">
    <div class="geo-ring"></div>
    <div class="geo-ring"></div>
    <div class="geo-ring"></div>
    <div class="geo-line"></div>
  </div>

  <div class="brand">
    <div class="brand-mark">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1L15 5V11L8 15L1 11V5L8 1Z" fill="#0e0d0b"/>
        </svg>
      </div>
      <span class="brand-name">Aether</span>
    </div>
  </div>

  <div class="panel-quote">
    <span class="quote-mark" aria-hidden="true">"</span>
    <p class="quote-text">The simplest things are often the truest.</p>
    <div class="quote-divider"></div>
    <span class="quote-attribution">Richard Bach</span>
  </div>
</div>

<div class="panel-right">
  <div class="form-wrapper">
    <div class="form-header">
      <div class="form-eyebrow">Welcome back</div>
      <h1 class="form-title">Sign in</h1>
      <p class="form-subtitle">Enter your credentials to access your account.</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="field">
        <label class="field-label" for="email">Email address</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="error-msg" id="emailError">Please enter a valid email address.</div>
      </div>

      <div class="field">
        <label class="field-label" for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="error-msg" id="passwordError">Password must be at least 8 characters.</div>
      </div>

      <div class="form-meta">
        <label class="remember">
          <input type="checkbox" id="remember" />
          <span>Remember me</span>
        </label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" class="btn-signin">Sign in</button>
    </form>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <button type="button" class="btn-sso">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/><path d="M2 12h20"/>
      </svg>
      Continue with SSO
    </button>

    <p class="form-footer">
      Don't have an account? <a href="#" class="signup-link">Create one</a>
    </p>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const emailInput = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const emailError = document.getElementById('emailError');
  const passwordError = document.getElementById('passwordError');
  const togglePw = document.getElementById('togglePw');
  const eyeIcon = document.getElementById('eyeIcon');

  const eyeOpen = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>`;
  const eyeClosed = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  let pwVisible = false;

  togglePw.addEventListener('click', () => {
    pwVisible = !pwVisible;
    passwordInput.type = pwVisible ? 'text' : 'password';
    eyeIcon.innerHTML = pwVisible ? eyeClosed : eyeOpen;
  });

  function validateEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    let valid = true;
    emailError.style.display = 'none';
    passwordError.style.display = 'none';
    if (!validateEmail(emailInput.value.trim())) {
      emailError.style.display = 'block';
      valid = false;
    }
    if (passwordInput.value.length < 8) {
      passwordError.style.display = 'block';
      valid = false;
    }
    if (valid) {
      const btn = form.querySelector('.btn-signin');
      btn.textContent = 'Signing in…';
      btn.disabled = true;
    }
  });
</script>
</body>
</html>
