  <body>
    <header>
      <p>
      <big>Welcome You...</big><br />
      <smal>“Please log in and follow the instructions to view information.”</small>
    </p>
    </header>
   

   <main>
     <form action="index.html">
      <p>
        <u>1. click your <strong>Qualifications </strong>.</u>
    </p>
     <label for="101">
       <input type="checkbox" name="Education[]" value="SSLC" id="101" />SSLC<br />
     </label>
      <label for="102">
              <input type="checkbox" name="Education[]" value="PUC"  id="102" />PUC<br />
      </label>
      <label for="103">
        <input type="checkbox" name="Education[]" value="UG" id="103" />UG<br />
      </label>

        <input type="checkbox" name="Education[]" value="PG" id="104"/>PG<br>
      </label>
     
       <p>
        <u>2. Select your City .</u>
       </p>
      <select class="City">

      <option value="Mumbai">Mumbai</option>
      <option value="Kolkata">Kolkata</option>
      <option value="Delhi">Delhi</option><br><br>
      </select><br>

      <p>
        <u>3. Select Gender</u>
      </p>
      <label for="105">

      </label>
      <label for="106">
        <input type="radio" name="gender" value="Female" id="106">Female<br>
      </label>
      <label for="107">
        <input type="radio" name="gender" value="Others" id="107">Others<br>
      </label>

      <p>
        <u>4.Select Class</u>
      </p>
      <label for="108">
        <input type="radio" name="class" value="Class XII" id="108"/>Class XII<br>
      </label>
      <label for="109">

      </label>
      <label for="110">
        <input type="radio" name="class" value="PG" id="110"/>PG<br>
      </label>

      <button type="submit">Submit</button>
    </form><br>
   </main>
   <footer>
